name: drop-race
on:
  schedule:
    # Six staggered triggers from 5:45pm ET. GitHub delayed every trigger by
    # 20-45 min on a busy Saturday, so the ladder starts far earlier; the
    # script sleeps until 6:59:30pm ET no matter which rung actually starts.
    - cron: "45 21 * * *"   # 5:45 pm EDT
    - cron: "0 22 * * *"    # 6:00 pm EDT
    - cron: "15 22 * * *"   # 6:15 pm EDT
    - cron: "30 22 * * *"   # 6:30 pm EDT
    - cron: "40 22 * * *"   # 6:40 pm EDT
    - cron: "50 22 * * *"   # 6:50 pm EDT
    - cron: "45 22 * * *"   # 5:45 pm EST
    - cron: "0 23 * * *"    # 6:00 pm EST
    - cron: "15 23 * * *"   # 6:15 pm EST
    - cron: "30 23 * * *"   # 6:30 pm EST
    - cron: "40 23 * * *"   # 6:40 pm EST
    - cron: "50 23 * * *"   # 6:50 pm EST
  workflow_dispatch: {}

concurrency:
  group: bethpage-state
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  droprace:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -q requests pyyaml
      - name: run drop race
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          SMS_EMAIL: ${{ secrets.SMS_EMAIL }}
          FOREUP_COOKIE: ${{ secrets.FOREUP_COOKIE }}
          FOREUP_JWT: ${{ secrets.FOREUP_JWT }}
        run: python monitor.py droprace
      - name: persist state
        run: |
          git config user.name "tee-bot"
          git config user.email "tee-bot@users.noreply.github.com"
          git add state.json || true
          git diff --cached --quiet || git commit -m "state: drop-race $(date -u +%F_%H%M)"
          git pull --rebase --autostash origin ${GITHUB_REF_NAME} || true
          git push || true
