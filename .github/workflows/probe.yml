name: probe
on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -q requests pyyaml
      - name: discover courses (read the log below)
        env:
          FOREUP_COOKIE: ${{ secrets.FOREUP_COOKIE }}
          FOREUP_JWT: ${{ secrets.FOREUP_JWT }}
        run: python monitor.py probe
      - name: persist discovery
        run: |
          git config user.name "tee-bot"
          git config user.email "tee-bot@users.noreply.github.com"
          git add state.json || true
          git diff --cached --quiet || git commit -m "state: probe"
          git push || true
