name: test-alert
on:
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: send test email and text
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          SMS_EMAIL: ${{ secrets.SMS_EMAIL }}
        run: |
          python - <<'EOF'
          import os, smtplib, ssl
          from email.mime.text import MIMEText
          user, pw = os.environ["GMAIL_ADDRESS"], os.environ["GMAIL_APP_PASSWORD"]
          body = "*BLACK Sat 7/18 3:40pm - 4 spots (TEST)\nhttps://foreupsoftware.com/index.php/booking/19765/2431#/teetimes"
          ctx = ssl.create_default_context()
          with smtplib.SMTP_SSL("smtp.gmail.com", 465, context=ctx) as s:
              s.login(user, pw)
              for to in (os.environ["ALERT_EMAIL"], os.environ["SMS_EMAIL"]):
                  m = MIMEText(body); m["Subject"] = "[TEE] test alert"; m["From"] = user; m["To"] = to
                  s.sendmail(user, [to], m.as_string())
          print("sent")
          EOF
